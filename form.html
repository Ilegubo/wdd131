<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Purchase Form</title>
    <meta name="description" content="A form to collect data about purchase of products">
    <meta name="author" content="Ilegubo Kofi Owusu">
    <link rel="stylesheet" href="styles/forms.css">
    <link rel="stylesheet" href="styles/forms-large.css">
    <script src="scripts/forms.js" defer></script>
</head>

<body>
    <header>
        <h1>PRODUCT REVIEW</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <label for="pname">
                    <select id="pname" name="pname" required>
                        <option disabled selected>Select a Product...</option>
                        <!-- Input code to dynamically place product items -->
                    </select>
                </label>
            </fieldset>

            <fieldset>
                <div class="product-rating">Product Rating
                    <label for="prating" id="onestar"><input type="radio" name="prating" value="onestar">&star;</label>
                    <label for="prating" id="twostar"><input type="radio" name="prating"
                            value="twostar">&star;&star;</label>
                    <label for="prating" id="threestar"><input type="radio" name="prating"
                            value="threestar">&star;&star;&star;</label>
                    <label for="prating" id="fourstar"><input type="radio" name="prating"
                            value="fourstar">&star;&star;&star;&star;</label>
                    <label for="prating" id="fivestar"><input type="radio" name="prating"
                            value="fivestar">&star;&star;&star;&star;&star;</label>
                </div>
            </fieldset>
            <fieldset>
                <label for="installationDate" id="installation-date">Installation Date* <input type="date"
                        name="installationDate" required></label>
            </fieldset>
            <fieldset><label for="usefulFeatures">Useful Features
                    <input type="checkbox" name="usefulFeatures" value="">
                    <input type="checkbox" name="usefulFeatures" value="">
                    <input type="checkbox" name="usefulFeatures" value="">
                    <input type="checkbox" name="usefulFeatures" value="">
                    <input type="checkbox" name="usefulFeatures" value="">
                    <input type="checkbox" name="usefulFeatures" value="">
                    <input type="checkbox" name="usefulFeatures" value="">
                    <input type="checkbox" name="usefulFeatures" value="">
                </label></fieldset>
            <fieldset>
                <label for="writtenReview" id="review">
                    <input type="textarea" name="writtenReview" placeholder="Write a review">
                </label>
            </fieldset>
            <fieldset>
                <label for="userName" id="userName">User name
                    <input type="text" name="userName">
                </label>
            </fieldset>
            <label for="submisEntries" id="submitEntries">Submit My Information
                <input type="submit" name="submissionEntries">
            </label>

        </form>
    </main>
    <footer>
        <p>
            &copy;<span id="copy-right-year">|</span>
            <span>Ilegubo Kofi Owusu |</span>
            <span>The Republic of Ghana |</span>
        </p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
