<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Purchase Form</title>
    <meta name="description"
        content="A form to collect data about purchase of products and also provide review of products">
    <meta name="author" content="Ilegubo Kofi Owusu">
    <link rel="stylesheet" href="styles/forms.css">
    <link rel="stylesheet" href="styles/forms-large.css">
    <script src="scripts/forms.js" defer></script>
</head>

<body>
    <header>
        <h1>PRODUCT REVIEW</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <label for="pname">Product Name
                    <select id="pname" name="pname" required>
                        <option disabled selected value="">Select a Product...</option>
                    </select>
                </label>
            </fieldset>

            <fieldset>
                <div class="product-rating">Product Rating
                    <label><input type="radio" name="prating" value="onestar">&star;</label>
                    <label><input type="radio" name="prating" value="twostar">&star;&star;</label>
                    <label><input type="radio" name="prating" value="threestar">&star;&star;&star;</label>
                    <label><input type="radio" name="prating" value="fourstar">&star;&star;&star;&star;</label>
                    <label><input type="radio" name="prating" value="fivestar">&star;&star;&star;&star;&star;</label>
                </div>
            </fieldset>

            <fieldset>
                <label for="installationDate">Installation Date* <input type="date" id="installationDate"
                        name="installationDate" required>
                </label>
            </fieldset>

            <fieldset>
                <label>Useful Features
                    <input type="checkbox" name="usefulFeatures" value="feature1">
                </label>
                <label>
                    <input type="checkbox" name="usefulFeatures" value="feature2">
                </label>
                <label>
                    <input type="checkbox" name="usefulFeatures" value="feature3">
                </label>
                </label>
            </fieldset>

            <fieldset>
                <label for="writtenReview">Review
                    <textarea id="writtenReview" name="writtenReview" placeholder="Write a review" rows="5"
                        cols="50"></textarea>
                </label>
            </fieldset>

            <fieldset>
                <label for="userName">User name
                    <input type="text" id="userName" name="userName">
                </label>
            </fieldset>

            <input type="submit" id="submitEntries" value="Submit My Information">

        </form>
    </main>
    <footer>
        <p>
            &copy;<span id="copy-right-year"></span>
            <span>Ilegubo Kofi Owusu |</span>
            <span>The Republic of Ghana |</span>
        </p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
