<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
    <meta name="description" content="Exploring the usage of tables in HTML/CSS">
    <meta name="author" content="Ilegubo Kofi Owusu">
    <link rel="stylesheet" href="styles/table.css">
</head>

<body>
    <table>
        <caption>Table: 1 Account Feature Comparison</caption>
        <tbody>
            <tr class="black">
                <th scope="col" colspan="4">ACME Wildest Services</th>
            </tr>
            <tr>
                <td class="black"></td>
                <th>Basic</th>
                <th>Premium</th>
                <th>Deluxe</th>
            </tr>
            <tr>
                <th scope="row">Feature</th>
                <td>✔️</td>
                <td>✔️</td>
                <td>✔️</td>
            </tr>
            <tr>
                <th scope="row">Feature</th>
                <td>❌</td>
                <td>✔️</td>
                <td>✔️</td>

            </tr>
            <tr>
                <th scope="row">Feature</th>
                <td>❌</td>
                <td>❌</td>
                <td>✔️</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
