<body>
    <!-- HEADER HERE -->
    <header>
        <h1>Course Proposal</h1>
        <h2>Designing Web Forms</h2>
    </header>


    <!-- NAVIGATION HERE -->
    <nav>
        <ul>
            <li><a href="#">About</a></li>
            <li class="active"><a href="#">Propose</a></li>
            <li><a href="#">Winners</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>


    <!-- CONTENT HERE -->
    <main>
        <h1>Course Proposal Application</h1>
        <form method="get" action="thanks.html">
            <fieldset>
                <legend>Applicant Information</legend>
                <label for="fname">First Name* <input type="text" name="fname" required></label>
                <label for="fname">Last Name* <input type="text" name="lname" required></label>
                <label for="tel">Tel <input type="tel" name="tel" placeholder="050 000 0000"></label>
                <label for="email">Email <input type="email" name="email" required></label>
                <label for="url">Website <input type="url" name="url" required></label>
            </fieldset>

            <fieldset>
                <legend>Course Information</legend>
                <div>Audience
                    <label><input type="radio" name="audience" value="beginner">Beginner</label>
                    <label><input type="radio" name="audience" value="Intermediate">Beginner</label>
                    <label><input type="radio" name="audience" value="Advanced">Beginner</label>
                </div>

                <div>Software
                    <label for="software"><input type="checkbox" name="editing" value="yes">Photo Editing</label>
                    <label for="software"><input type="checkbox" name="code" value="yes">Coding</label>
                    <label for="software"><input type="checkbox" name="processor" value="yes">Preprocessor</label>
                    <label for="software"><input type="checkbox" name="client" value="yes">FTP Client</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Funding</legend>
                <label for="completedDate"><input type="date" name="completedDate" </label>
            </fieldset>
        </form>



    </main>
